{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper fade-in">
    <div class="glass-panel" style="max-width: 450px;">
        
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="icon-circle" style="margin: 0 auto 15px auto; width: 60px; height: 60px; font-size: 28px; background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.3);">
                🔐
            </div>
            <h2 style="font-size: 26px; font-weight: 800; color: #f8fafc; margin-bottom: 10px;">Account Recovery</h2>
            <p style="color: #94a3b8; font-size: 14px; line-height: 1.5;">
                Enter your username and your exact 8-word master recovery phrase to reset your credentials.
            </p>
        </div>

        {% if error %}
        <div class="error-msg fade-in">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('reset_password') }}" method="POST" class="auth-form">
            <div style="margin-bottom: 15px;">
                <label style="color: rgba(255, 255, 255, 0.7);">Username</label>
                <input type="text" name="username" placeholder="e.g. alex_sharma" required style="color: #fff;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="color: rgba(255, 255, 255, 0.7);">8-Word Recovery Phrase</label>
                <input type="text" name="phrase" placeholder="e.g. apple brave cranberry delta..." required style="color: #38bdf8; font-family: monospace; letter-spacing: 1px;">
            </div>
            
            <div style="margin-bottom: 25px;">
                <label style="color: rgba(255, 255, 255, 0.7);">New Password</label>
                <input type="password" name="new_password" placeholder="Enter your new secure password" required style="color: #fff;">
            </div>
            
            <button type="submit" class="btn-auth" style="box-shadow: 0 10px 25px rgba(0, 102, 255, 0.4); font-size: 15px; padding: 16px;">
                Verify & Reset Password
            </button>
        </form>
        
        <div class="auth-footer">
            <a href="{{ url_for('login') }}" style="font-size: 14px; font-weight: 600;">← Back to Secure Login</a>
        </div>
        
    </div>
</div>
{% endblock %}
